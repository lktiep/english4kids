name: EduKids
options:
  bundleIdPrefix: dev.jackle
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  groupSortPosition: top

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"

targets:
  EduKids:
    type: application
    platform: iOS
    sources:
      - EduKids
    dependencies:
      - package: Supabase
        product: Supabase
    settings:
      base:
        INFOPLIST_KEY_CFBundleDisplayName: EduKids
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UIStatusBarStyle: UIStatusBarStyleLightContent
        INFOPLIST_KEY_UIUserInterfaceStyle: Dark
        INFOPLIST_KEY_LSApplicationQueriesSchemes: ""
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        Release:
          SWIFT_OPTIMIZATION_LEVEL: -Owholemodule
    info:
      path: EduKids/Info.plist
      properties:
        CFBundleURLTypes:
          - CFBundleTypeRole: Editor
            CFBundleURLSchemes:
              - dev.jackle.edukids
        NSMicrophoneUsageDescription: "EduKids cần micro để luyện phát âm tiếng Anh"
        NSSpeechRecognitionUsageDescription: "EduKids cần nhận dạng giọng nói để chấm điểm phát âm"
        ITSAppUsesNonExemptEncryption: false
        UILaunchScreen: {}
        UIViewControllerBasedStatusBarAppearance: false
        NSBluetoothAlwaysUsageDescription: "EduKids sử dụng Bluetooth để hỗ trợ đăng nhập"
